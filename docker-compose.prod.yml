services:
  api:
    env_file: .env.prod
    volumes: []
    ports: [] # No ports exposed to host except through nginx
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  worker:
    env_file: .env.prod
    volumes: []
    ports: []
    restart: always
    command: celery -A celery_config worker --loglevel=info --concurrency=2
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1024M

  postgres:
    env_file: .env.prod
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    env_file: .env.prod
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  clamav:
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

  flower:
    env_file: .env.prod
    ports: [] # Only accessible via nginx IP restricted route
    restart: always
