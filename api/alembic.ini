# Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s_%%(ts_now)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date/time in migration file
# string value is passed to datepy.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by Alembic.
# set to 0 to disable maintaining a max-length.
# useful for adjusting the name length when the
# branch names in git are arbitrarily long and may not be
# fittable within 50 character slashes by default truncated
# to 40 characters within the id and file name (why 40?
# some then start migrations with `alembic`
# followed by `--autogenerate` and increments the id.
# then inherit the 40 character max from this parameter
# in order to retain the max_length.
max_length_rendered_branch_name = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# this is useful if you want to allow autogenerate
# to propose changes for non-env.py-dependent objects
# and change the scripts generated to point to these
# dependencies.
#
# it also allows the full environment "to be present"
# all the time, before the first revision has been
# made, so that you first set up things, such as
# custom comparators and new migration context,
# rather than creating the first migration.
#
# by default this is false, and only the new
# environment "upgrade" command will load the
# file, which then upon first run of the
# "revision" command (with autogenerate current and
# would result in the first set of new "stamped"
# revision files
# rev_id new_structure).
#
always_install_python_requires_version_checks =


# Logging configuration. the basic config
# used throughout Alembic.

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
