server {
    listen 80;
    server_name dblockhub.com www.dblockhub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dblockhub.com www.dblockhub.com;

    ssl_certificate /etc/letsencrypt/live/dblockhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dblockhub.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 6m;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger Docs
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Health Check (Public)
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # Flower (Internal Only - restricted to server IP in real production)
    # location /flower/ {
    #     proxy_pass http://flower:5555/;
    #     proxy_set_header Host $host;
    # }
}
